<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Шахматы 1v1 без сервера</title>
  <style>
    :root {
      --bg: #10141b;
      --panel: #1a2230;
      --border: #2a364c;
      --text: #e7edf7;
      --muted: #9db0cb;
      --accent: #57a2ff;
      --ok: #48d597;
      --danger: #ff6b6b;
      --light: #f0d9b5;
      --dark: #b58863;
      --highlight: #e6ff63;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 16px;
    }

    .wrap {
      max-width: 1100px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 360px 1fr;
      gap: 16px;
    }

    @media (max-width: 900px) {
      .wrap { grid-template-columns: 1fr; }
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 20px;
    }

    p, label, small { color: var(--muted); }

    .buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 10px;
    }

    button {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #2f4a77;
      background: #254a78;
      color: #fff;
      font-weight: 600;
      cursor: pointer;
    }

    button:hover { filter: brightness(1.08); }
    button.secondary {
      background: #233042;
      border-color: var(--border);
    }

    textarea, input {
      width: 100%;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: #0f1723;
      color: var(--text);
      padding: 8px;
      margin-top: 6px;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 12px;
    }

    textarea { min-height: 90px; resize: vertical; }

    .status { margin: 8px 0; font-size: 14px; }
    .ok { color: var(--ok); }
    .bad { color: var(--danger); }

    .board-wrap {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .board {
      width: min(92vw, 640px);
      aspect-ratio: 1 / 1;
      display: grid;
      grid-template-columns: repeat(8, 1fr);
      border: 1px solid #3a4d6d;
      border-radius: 8px;
      overflow: hidden;
      user-select: none;
    }

    .sq {
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: clamp(28px, 5.2vw, 56px);
      cursor: pointer;
      position: relative;
    }

    .sq.light { background: var(--light); }
    .sq.dark { background: var(--dark); }
    .sq.selected::after,
    .sq.target::after {
      content: "";
      position: absolute;
      inset: 8%;
      border: 3px solid var(--highlight);
      border-radius: 6px;
      pointer-events: none;
    }

    .meta {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 10px;
      font-size: 14px;
    }

    .move-list {
      margin-top: 10px;
      max-height: 180px;
      overflow: auto;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px;
      background: #121a27;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 12px;
      line-height: 1.4;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="card">
      <h1>Онлайн-шахматы (2 игрока)</h1>
      <p>Без отдельного сервера для партии: обмен ходами идет напрямую через WebRTC. Нужен только ручной обмен кодом подключения.</p>

      <div class="buttons">
        <button id="hostBtn">Создать игру (Белые)</button>
        <button id="joinBtn">Подключиться (Черные)</button>
      </div>

      <label for="localSdp">Твой код (скопируй и отправь сопернику)</label>
      <textarea id="localSdp" readonly></textarea>
      <button class="secondary" id="copyBtn">Скопировать код</button>

      <label for="remoteSdp" style="margin-top: 10px; display: block;">Код соперника (вставь сюда)</label>
      <textarea id="remoteSdp" placeholder="Вставь offer/answer JSON и нажми Применить"></textarea>
      <button id="applyBtn">Применить код соперника</button>

      <div class="status" id="connStatus">Статус: <span class="bad">не подключено</span></div>
      <div class="status" id="roleStatus">Ты: —</div>
      <div class="status" id="turnStatus">Ход: —</div>
      <div class="status" id="gameStatus">Партия: ожидание</div>

      <div class="meta">
        <div>FEN: <small id="fenTxt">—</small></div>
        <div>Последний ход: <small id="lastMove">—</small></div>
      </div>
      <div class="move-list" id="moves">Ходы:\n</div>
    </section>

    <section class="card board-wrap">
      <div id="board" class="board"></div>
    </section>
  </div>

  <script src="https://unpkg.com/chess.js@1.0.0-beta.7/dist/chess.js"></script>
  <script>
    (function () {
      if (!window.Chess) {
        alert("Не удалось загрузить chess.js. Проверь интернет.");
        return;
      }

      const boardEl = document.getElementById("board");
      const connStatusEl = document.getElementById("connStatus");
      const roleStatusEl = document.getElementById("roleStatus");
      const turnStatusEl = document.getElementById("turnStatus");
      const gameStatusEl = document.getElementById("gameStatus");
      const fenTxtEl = document.getElementById("fenTxt");
      const lastMoveEl = document.getElementById("lastMove");
      const movesEl = document.getElementById("moves");
      const localSdpEl = document.getElementById("localSdp");
      const remoteSdpEl = document.getElementById("remoteSdp");

      const hostBtn = document.getElementById("hostBtn");
      const joinBtn = document.getElementById("joinBtn");
      const applyBtn = document.getElementById("applyBtn");
      const copyBtn = document.getElementById("copyBtn");

      const pcConfig = { iceServers: [{ urls: "stun:stun.l.google.com:19302" }] };
      let pc = null;
      let channel = null;
      let isHost = false;
      let myColor = null;
      let selectedSquare = null;
      let possibleTargets = [];

      const chess = new Chess();
      const files = ["a", "b", "c", "d", "e", "f", "g", "h"];
      const ranks = [8, 7, 6, 5, 4, 3, 2, 1];

      const pieceMap = {
        wp: "♙", wr: "♖", wn: "♘", wb: "♗", wq: "♕", wk: "♔",
        bp: "♟", br: "♜", bn: "♞", bb: "♝", bq: "♛", bk: "♚"
      };

      function setStatus() {
        const connected = channel && channel.readyState === "open";
        connStatusEl.innerHTML = "Статус: " + (connected ? "<span class='ok'>подключено</span>" : "<span class='bad'>не подключено</span>");
        roleStatusEl.textContent = "Ты: " + (myColor ? (myColor === "w" ? "Белые" : "Черные") : "—");
        turnStatusEl.textContent = "Ход: " + (chess.turn() === "w" ? "Белых" : "Черных");

        if (chess.isCheckmate()) {
          gameStatusEl.textContent = "Партия: мат, победа " + (chess.turn() === "w" ? "черных" : "белых");
        } else if (chess.isDraw()) {
          gameStatusEl.textContent = "Партия: ничья";
        } else if (chess.isCheck()) {
          gameStatusEl.textContent = "Партия: шах";
        } else {
          gameStatusEl.textContent = "Партия: идет";
        }

        fenTxtEl.textContent = chess.fen();
      }

      function renderMoves() {
        const history = chess.history();
        let txt = "Ходы:\n";
        for (let i = 0; i < history.length; i += 2) {
          const moveNum = Math.floor(i / 2) + 1;
          const white = history[i] || "";
          const black = history[i + 1] || "";
          txt += moveNum + ". " + white + "  " + black + "\n";
        }
        movesEl.textContent = txt;
      }

      function isMyTurn() {
        if (!myColor) return false;
        return chess.turn() === myColor;
      }

      function clearSelection() {
        selectedSquare = null;
        possibleTargets = [];
      }

      function buildBoard() {
        boardEl.innerHTML = "";
        const orientationWhite = myColor !== "b";
        const boardData = chess.board();

        const drawRanks = orientationWhite ? ranks : [...ranks].reverse();
        const drawFiles = orientationWhite ? files : [...files].reverse();

        for (let r = 0; r < 8; r++) {
          for (let f = 0; f < 8; f++) {
            const rank = drawRanks[r];
            const file = drawFiles[f];
            const square = file + String(rank);
            const modelRow = 8 - rank;
            const modelCol = files.indexOf(file);
            const piece = boardData[modelRow][modelCol];

            const sq = document.createElement("div");
            sq.className = "sq " + (((r + f) % 2 === 0) ? "light" : "dark");
            sq.dataset.square = square;

            if (selectedSquare === square) sq.classList.add("selected");
            if (possibleTargets.includes(square)) sq.classList.add("target");

            if (piece) {
              sq.textContent = pieceMap[piece.color + piece.type] || "";
            }

            sq.addEventListener("click", onSquareClick);
            boardEl.appendChild(sq);
          }
        }
      }

      function getLegalTargets(from) {
        return chess.moves({ square: from, verbose: true }).map((m) => m.to);
      }

      function sendMessage(payload) {
        if (channel && channel.readyState === "open") {
          channel.send(JSON.stringify(payload));
        }
      }

      function tryLocalMove(from, to) {
        const move = chess.move({ from: from, to: to, promotion: "q" });
        if (!move) return false;
        lastMoveEl.textContent = move.san;
        sendMessage({ type: "move", from: from, to: to, promotion: "q" });
        clearSelection();
        renderMoves();
        buildBoard();
        setStatus();
        return true;
      }

      function onSquareClick(ev) {
        if (!isMyTurn()) return;

        const square = ev.currentTarget.dataset.square;
        const piece = chess.get(square);

        if (!selectedSquare) {
          if (!piece) return;
          if ((piece.color === "w" ? "w" : "b") !== myColor) return;
          selectedSquare = square;
          possibleTargets = getLegalTargets(square);
          buildBoard();
          return;
        }

        if (square === selectedSquare) {
          clearSelection();
          buildBoard();
          return;
        }

        if (possibleTargets.includes(square)) {
          tryLocalMove(selectedSquare, square);
          return;
        }

        if (piece && piece.color === myColor) {
          selectedSquare = square;
          possibleTargets = getLegalTargets(square);
          buildBoard();
          return;
        }

        clearSelection();
        buildBoard();
      }

      function onChannelMessage(event) {
        let msg = null;
        try {
          msg = JSON.parse(event.data);
        } catch (_) {
          return;
        }

        if (msg.type === "move") {
          const move = chess.move({
            from: msg.from,
            to: msg.to,
            promotion: msg.promotion || "q"
          });
          if (move) {
            lastMoveEl.textContent = move.san;
            clearSelection();
            renderMoves();
            buildBoard();
            setStatus();
          }
        } else if (msg.type === "sync-fen" && typeof msg.fen === "string") {
          chess.load(msg.fen);
          clearSelection();
          renderMoves();
          buildBoard();
          setStatus();
        }
      }

      function waitIceDone(pcInstance) {
        return new Promise((resolve) => {
          if (pcInstance.iceGatheringState === "complete") {
            resolve();
            return;
          }
          function checkState() {
            if (pcInstance.iceGatheringState === "complete") {
              pcInstance.removeEventListener("icegatheringstatechange", checkState);
              resolve();
            }
          }
          pcInstance.addEventListener("icegatheringstatechange", checkState);
        });
      }

      function attachCommonPeerEvents(pcInstance) {
        pcInstance.addEventListener("connectionstatechange", setStatus);
        pcInstance.addEventListener("iceconnectionstatechange", setStatus);
      }

      function attachChannel(ch) {
        channel = ch;
        channel.onopen = () => {
          setStatus();
          // Sync position after connect in case one side already moved.
          sendMessage({ type: "sync-fen", fen: chess.fen() });
        };
        channel.onclose = setStatus;
        channel.onerror = setStatus;
        channel.onmessage = onChannelMessage;
      }

      async function createHostOffer() {
        resetConnection();
        isHost = true;
        myColor = "w";
        chess.reset();
        lastMoveEl.textContent = "—";
        renderMoves();
        clearSelection();
        buildBoard();
        setStatus();

        pc = new RTCPeerConnection(pcConfig);
        attachCommonPeerEvents(pc);
        const dc = pc.createDataChannel("chess");
        attachChannel(dc);

        const offer = await pc.createOffer();
        await pc.setLocalDescription(offer);
        await waitIceDone(pc);
        localSdpEl.value = JSON.stringify(pc.localDescription);
      }

      async function createGuestAnswer(offerObj) {
        resetConnection();
        isHost = false;
        myColor = "b";
        chess.reset();
        lastMoveEl.textContent = "—";
        renderMoves();
        clearSelection();
        buildBoard();
        setStatus();

        pc = new RTCPeerConnection(pcConfig);
        attachCommonPeerEvents(pc);
        pc.ondatachannel = (ev) => attachChannel(ev.channel);

        await pc.setRemoteDescription(offerObj);
        const answer = await pc.createAnswer();
        await pc.setLocalDescription(answer);
        await waitIceDone(pc);
        localSdpEl.value = JSON.stringify(pc.localDescription);
      }

      async function applyRemoteDescription() {
        const raw = remoteSdpEl.value.trim();
        if (!raw) {
          alert("Вставь код соперника.");
          return;
        }

        let data;
        try {
          data = JSON.parse(raw);
        } catch (_) {
          alert("Неверный JSON-код.");
          return;
        }

        if (!data || !data.type || !data.sdp) {
          alert("В коде нет type/sdp.");
          return;
        }

        if (!pc) {
          if (data.type === "offer") {
            await createGuestAnswer(data);
            return;
          }
          alert("Сначала нажми 'Создать игру', затем вставь ответ.");
          return;
        }

        if (data.type === "answer") {
          await pc.setRemoteDescription(data);
          setStatus();
          return;
        }

        if (data.type === "offer") {
          alert("На этой стороне уже создано соединение. Для offer открой вторую вкладку и нажми 'Подключиться'.");
        }
      }

      function resetConnection() {
        if (channel) {
          try { channel.close(); } catch (_) {}
        }
        if (pc) {
          try { pc.close(); } catch (_) {}
        }
        channel = null;
        pc = null;
        localSdpEl.value = "";
        remoteSdpEl.value = "";
      }

      hostBtn.addEventListener("click", async () => {
        try {
          await createHostOffer();
        } catch (e) {
          alert("Ошибка создания игры: " + (e && e.message ? e.message : e));
        }
      });

      joinBtn.addEventListener("click", () => {
        resetConnection();
        myColor = "b";
        chess.reset();
        lastMoveEl.textContent = "—";
        clearSelection();
        renderMoves();
        buildBoard();
        setStatus();
        alert("Вставь offer от хоста в поле 'Код соперника' и нажми 'Применить'.");
      });

      applyBtn.addEventListener("click", async () => {
        try {
          await applyRemoteDescription();
        } catch (e) {
          alert("Ошибка применения кода: " + (e && e.message ? e.message : e));
        }
      });

      copyBtn.addEventListener("click", async () => {
        if (!localSdpEl.value) return;
        try {
          await navigator.clipboard.writeText(localSdpEl.value);
        } catch (_) {}
      });

      renderMoves();
      buildBoard();
      setStatus();
    })();
  </script>
</body>
</html>
